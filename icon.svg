<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Icone Minhas Economias">
  <defs>
    <linearGradient id="circle-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9df48" />
      <stop offset="100%" stop-color="#a8cc39" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#7b9a2b" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Main circle -->
  <g filter="url(#soft-shadow)">
    <circle cx="96" cy="96" r="74" fill="url(#circle-grad)" />
  </g>

  <!-- Main money symbol -->
  <text
    x="96"
    y="118"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="92"
    font-weight="700"
    fill="#ffffff"
  >$</text>

  <!-- Highlight for depth -->
  <ellipse cx="75" cy="58" rx="28" ry="12" fill="#ffffff" opacity="0.16" />
</svg>